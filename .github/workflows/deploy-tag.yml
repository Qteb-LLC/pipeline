name: Tag pipeline

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  version:
    uses: ./.github/workflows/version.yml

  lint-test:
    uses: ./.github/workflows/lint-test.yml

  build:
    needs: [version, lint-test]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:latest
          cache-to: type=inline

    timeout-minutes: 15

  build-web:
    needs: [version, lint-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if front/ exists
        id: front
        run: |
          if [ -d "front" ]; then echo "exists=true" >> $GITHUB_OUTPUT
          else echo "exists=false" >> $GITHUB_OUTPUT; fi

      - name: Compute web image name
        id: image
        if: steps.front.outputs.exists == 'true'
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/web" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        if: steps.front.outputs.exists == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.front.outputs.exists == 'true'

      - uses: docker/build-push-action@v6
        if: steps.front.outputs.exists == 'true'
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_BOT_USERNAME }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

    timeout-minutes: 15

  deploy-preview:
    needs: [build, build-web]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: preview
      version: ${{ github.ref_name }}
    secrets: inherit

  deploy-prod:
    needs: [build, build-web]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      version: ${{ github.ref_name }}
    secrets: inherit
