name: Build

on:
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  version:
    uses: ./.github/workflows/version.yml
    with:
      branch: ${{ github.head_ref }}

  lint-test:
    uses: ./.github/workflows/lint-test.yml

  build:
    needs: [version, lint-test]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.version.outputs.semver }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:latest
          cache-to: type=inline

    timeout-minutes: 15

  build-web:
    needs: [version, lint-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect front/ changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -q '^front/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        if: steps.changes.outputs.changed == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.changes.outputs.changed == 'true'

      - name: Compute web image name
        id: image
        if: steps.changes.outputs.changed == 'true'
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/web" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.version.outputs.semver }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_BOT_USERNAME }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

    timeout-minutes: 15

  deploy-preview:
    needs: [build, build-web, version]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: preview
      version: ${{ needs.version.outputs.semver }}
    secrets: inherit
