name: Release

on:
  workflow_call:

jobs:
  version:
    uses: Qteb-LLC/pipeline/.github/workflows/version.yml@main
    with:
      branch: ${{ github.ref_name }}

  release:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Extract changelog notes
        run: |
          if [ -f "CHANGELOG.md" ]; then
            sed -n '/^## /,/^## /p' CHANGELOG.md | head -n -1 > notes.txt || echo "Release ${{ needs.version.outputs.semver }}" > notes.txt
          else
            echo "Release ${{ needs.version.outputs.semver }}" > notes.txt
          fi

      - name: Create tag + GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT || github.token }}
          tag_name: ${{ needs.version.outputs.semver }}
          name: Release ${{ needs.version.outputs.semver }}
          body_path: notes.txt
