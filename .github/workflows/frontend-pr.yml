name: Frontend PR

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        type: string
        default: "Dockerfile"
      services:
        description: Docker-compose services to deploy (comma-separated)
        type: string
        default: "web"
      version-var:
        description: Version variable name for .env (e.g. WEB_VERSION)
        type: string
        default: "WEB_VERSION"

jobs:
  version:
    uses: Qteb-LLC/pipeline/.github/workflows/version.yml@main
    with:
      branch: ${{ github.head_ref }}

  publish:
    needs: [version]
    uses: Qteb-LLC/pipeline/.github/workflows/publish-web.yml@main
    with:
      dockerfile: ${{ inputs.dockerfile }}
      version: ${{ needs.version.outputs.semver }}

  deploy-preview:
    needs: [publish, version]
    uses: Qteb-LLC/pipeline/.github/workflows/deploy.yml@main
    with:
      environment: preview
      version: ${{ needs.version.outputs.semver }}
      services: ${{ inputs.services }}
      version-var: ${{ inputs.version-var }}
    secrets: inherit
