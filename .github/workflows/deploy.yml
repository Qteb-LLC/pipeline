name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy (preview or prod)
        required: true
        type: string
      version:
        description: Version to deploy
        required: true
        type: string
      services:
        description: Comma-separated list of docker-compose services to pull and recreate
        required: true
        type: string
      version-var:
        description: Version variable name to update in .env on server
        required: true
        type: string

env:
  ANSIBLE_HOST_KEY_CHECKING: "false"
  ANSIBLE_FORCE_COLOR: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'prod' && 'https://t.me/mimir_robot' || 'https://t.me/mimir_preview_robot' }}
    env:
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/pipeline/.cache/ansible-roles
    steps:
      - name: Checkout service repo (configs)
        uses: actions/checkout@v4
        with:
          path: service

      - name: Checkout pipeline repo (ansible, utils, docker-compose)
        uses: actions/checkout@v4
        with:
          repository: Qteb-LLC/pipeline
          path: pipeline
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Merge configs into pipeline workspace
        run: |
          # Copy service-specific configs into pipeline conf structure
          cp -r service/conf/shared/* pipeline/conf/shared/ 2>/dev/null || true
          cp -r service/conf/${{ inputs.environment }}/* pipeline/conf/${{ inputs.environment }}/ 2>/dev/null || true
          # Copy .sops.yaml from service repo
          cp service/.sops.yaml pipeline/ 2>/dev/null || true

      - name: Cache ansible deps + sops
        uses: actions/cache@v4
        with:
          key: deploy-${{ hashFiles('pipeline/ansible/requirements.yml') }}
          restore-keys: deploy-
          path: |
            pipeline/.cache/pip
            pipeline/.cache/ansible-roles
            pipeline/.cache/bin

      - name: Setup deploy tools
        working-directory: pipeline
        run: |
          sudo apt-get install -y --no-install-recommends gnupg openssh-client
          pip install --quiet ansible
          mkdir -p .cache/bin
          if [ ! -f ".cache/bin/sops" ]; then
            curl -sL https://github.com/getsops/sops/releases/download/v3.9.2/sops-v3.9.2.linux.amd64 \
              -o .cache/bin/sops && chmod +x .cache/bin/sops
          fi
          export PATH="$PWD/.cache/bin:$PATH"
          sops --version
          ansible-galaxy role install -r ansible/requirements.yml
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Decrypt secrets
        working-directory: pipeline
        env:
          VAULT_KEY_PREVIEW: ${{ secrets.ANSIBLE_VAULT_KEY_PREVIEW }}
          VAULT_KEY_PROD: ${{ secrets.ANSIBLE_VAULT_KEY_PROD }}
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "$VAULT_KEY_PROD" > utils/prod_vault.key
          else
            echo "$VAULT_KEY_PREVIEW" > utils/preview_vault.key
          fi
          export PATH="$PWD/.cache/bin:$PATH"
          bash utils/decrypt.sh

      - name: Run ansible
        working-directory: pipeline
        env:
          CI_REGISTRY: ghcr.io
          CI_REGISTRY_USER: ${{ github.actor }}
          CI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          export PATH="$PWD/.cache/bin:$PATH"
          SSH_KEY="conf/${{ inputs.environment }}/id_rsa"
          chmod 600 "$SSH_KEY"
          DEPLOY_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          ansible-playbook -i ansible/inventory.yaml ansible/play.yml \
            -e "env=${{ inputs.environment }}" \
            -e "deploy_services=${{ inputs.services }}" \
            -e "deploy_version_var=${{ inputs.version-var }}" \
            -e "deploy_image=$DEPLOY_IMAGE" \
            --private-key="$SSH_KEY"

    timeout-minutes: 20
