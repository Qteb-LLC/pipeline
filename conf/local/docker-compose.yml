---
services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bot
    env_file:
      - ./bot.env
    volumes:
      - ./subscriptions.yml:/opt/bot/subscriptions.yml:ro
      - ./prompts.yml:/opt/bot/prompts.yml:ro
    networks:
      - bot_network
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: api
    env_file:
      - ./bot.env
    volumes:
      - ./subscriptions.yml:/opt/bot/subscriptions.yml:ro
      - ./prompts.yml:/opt/bot/prompts.yml:ro
    networks:
      - bot_network
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - ./postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: postgres
  redis_data:
    name: redis

networks:
  bot_network:
    driver: bridge
